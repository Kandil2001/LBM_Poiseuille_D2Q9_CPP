name: Bug report
description: Report a bug, numerical issue, or reproducibility problem
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue. Please include enough detail to reproduce the problem.
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What went wrong?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Which commands and parameters did you use?
      placeholder: |
        make
        ./lbm_channel 160 50 20000 0.8 1e-6 200
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, compiler, Python version, and relevant package versions.
      placeholder: |
        OS: Windows 11 / Ubuntu / MSYS2 UCRT64
        Compiler: g++ --version
        Python: python3 --version
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, plots, terminal output, or files if helpful.
    validations:
      required: false

name: Feature request
description: Suggest an improvement or extension
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for proposed improvements, new validation cases, or solver extensions.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful?
      placeholder: Explain the CFD, numerical, educational, or workflow reason.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
      placeholder: Describe the implementation idea or expected behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there simpler or different approaches?
    validations:
      required: false
  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: How could this feature be tested or compared?
      placeholder: Analytical solution, benchmark case, convergence study, or runtime comparison.
    validations:
      required: false

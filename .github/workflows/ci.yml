name: Build, test, and verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Build solver
        run: make

      - name: Test core LBM formulas
        run: make test

      - name: Run analytical verification case
        run: ./lbm_channel 80 30 12000 0.8 1e-6 200

      - name: Generate plots and enforce verification limits
        env:
          MPLBACKEND: Agg
        run: make verify

      - name: Verify generated outputs
        run: |
          test -s results/centerline_profile.csv
          test -s results/convergence.csv
          test -s results/velocity_field.csv
          test -s results/run_info.txt
          test -s results/verification_summary.csv
          test -s results/velocity_profile.png
          test -s results/convergence.png
